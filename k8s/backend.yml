apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tp-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: maximedesclaux/backend:latest
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: tp-app

spec:
  type: NodePort
  selector:
    app: backend

  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
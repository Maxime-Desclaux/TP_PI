apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tp-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: nginx:latest
          ports:
            - containerPort: 80

          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html

      volumes:
        - name: html
          configMap:
            name: frontend-html
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tp-app

spec:
  type: NodePort
  selector:
    app: frontend

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
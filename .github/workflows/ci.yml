name: CI/CD + Deploy K3s

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest


    deploy:
      needs: build-and-push
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Deploy on K3s VM via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.VM_HOST }}
            username: ${{ secrets.VM_USER }}
            key: ${{ secrets.VM_SSH_KEY }}
            script: |
              echo " Deploying on K3s..."

              # login docker (optionnel mais safe)
              echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

              # pull latest image
              docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest

              # apply kubernetes manifests
              kubectl apply -f k8s/namespace.yml
              kubectl apply -f k8s/configmap.yml
              kubectl apply -f k8s/backend.yml
              kubectl apply -f k8s/frontend.yml

              echo "Deployment finished"